# Production stack for the Hetzner VPS.
# The app image is built in CI and pulled from GHCR; Postgres runs locally
# with a named volume; Caddy terminates TLS (automatic Let's Encrypt).
#
# Deploy (on the VPS, in /opt/progressio):
#   docker login ghcr.io
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
services:
  app:
    image: ${IMAGE:-ghcr.io/samuelslivovsky-cmd/progressio}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # App talks to the Postgres container over the internal network.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      DIRECT_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  # BullMQ worker — runs the nightly analytics + weekly AI-summary processors
  # and registers the repeatable cron jobs. Uses the SAME GHCR image as `app`.
  #
  # ⚠️ PRODUCTION PACKAGING CAVEAT (follow-up needed):
  #   The prod image is a Next.js *standalone* build. It does NOT include `tsx`
  #   nor the raw `server/jobs/**.ts` sources, so the `pnpm run worker`
  #   (`tsx server/jobs/worker.ts`) command below will NOT work as-is in the
  #   standalone image. Before relying on this in prod, do ONE of:
  #     (a) compile the worker (e.g. `tsx build` / esbuild → dist/worker.js) and
  #         add it + its deps to the image, then run `node dist/worker.js`; or
  #     (b) build a second, non-standalone image that retains tsx + TS sources
  #         and node_modules, and point this service at it.
  #   The dev stack (docker-compose.yml) runs the worker correctly today.
  worker:
    image: ${IMAGE:-ghcr.io/samuelslivovsky-cmd/progressio}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: sh -c "pnpm --filter @progressio/web run worker"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      DIRECT_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
