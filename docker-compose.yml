services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: progressio
      POSTGRES_PASSWORD: progressio
      POSTGRES_DB: progressio
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U progressio"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
