# Development stack: Next.js app (hot reload) + PostgreSQL.
# Usage:
#   cp .env.example .env   # adjust values if needed
#   docker compose up --build
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    command: sh -c "pnpm --filter @progressio/db migrate:deploy && pnpm --filter @progressio/web exec next dev"
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Inside the compose network the DB is reachable as host "db".
      DATABASE_URL: postgresql://progressio:progressio@db:5432/progressio
      DIRECT_URL: postgresql://progressio:progressio@db:5432/progressio
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      # Keep container-installed deps / generated client / build cache.
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/web/.next
      - /app/packages/db/node_modules
      - /app/packages/config/node_modules
      - /app/packages/db/src/generated

  db:
    image: postgres:18-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: progressio
      POSTGRES_PASSWORD: progressio
      POSTGRES_DB: progressio
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U progressio"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
