name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "claude/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ github.sha }}
          restore-keys: |
            turbo-

      # Lint is informational: pre-existing Next 16 react-hooks rule violations
      # are tracked as separate tech debt.
      - name: Lint
        run: pnpm turbo run lint
        continue-on-error: true

      - name: Typecheck
        run: pnpm turbo run typecheck

      - name: Build
        run: pnpm turbo run build
        env:
          # Dummy values — build must not need a live DB/Redis, just a valid env shape.
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          DIRECT_URL: postgresql://user:pass@localhost:5432/db
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: ci-dummy-secret-ci-dummy-secret-ci-dummy
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_TELEMETRY_DISABLED: "1"
