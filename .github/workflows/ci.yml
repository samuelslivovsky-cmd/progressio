name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "claude/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      # Lint is informational for now: the codebase carries pre-existing
      # Next 16 react-hooks rule violations tracked as separate tech debt.
      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # Dummy values — build must not need a live DB, just valid env shape.
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          DIRECT_URL: postgresql://user:pass@localhost:5432/db
          NEXTAUTH_SECRET: ci-dummy-secret
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_TELEMETRY_DISABLED: "1"
